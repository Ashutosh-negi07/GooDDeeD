spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/gooddeeds_backbone
    username: blue
    password:
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  devtools:
    restart:
      enabled: false

