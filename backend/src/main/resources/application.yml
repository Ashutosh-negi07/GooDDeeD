spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Flyway configuration for database migrations
  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: true
    out-of-order: false
    locations: classpath:db/migration

  devtools:
    restart:
      enabled: false

  # Security Configuration
  security:
    headers:
      frame-options: DENY
      content-type-options: true
      xss-protection: true

server:
  # Error handling - don't expose sensitive information
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false
    whitelabel:
      enabled: false

  tomcat:
    threads:
      max: 200
      min-spare: 20
    accept-count: 100
    max-connections: 10000

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

# Rate limiting configuration
rate-limit:
  general:
    max-requests: ${RATE_LIMIT_GENERAL_MAX:100}
    window-seconds: ${RATE_LIMIT_GENERAL_WINDOW:60}
  auth:
    max-requests: ${RATE_LIMIT_AUTH_MAX:10}
    window-seconds: ${RATE_LIMIT_AUTH_WINDOW:60}

# CORS configuration
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000}

# Logging Configuration
logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
    com.gooddeeds: ${LOGGING_LEVEL_COM_GOODDEEDS:INFO}
    org.springframework.security: ${LOGGING_LEVEL_SECURITY:WARN}
    org.hibernate.SQL: ${LOGGING_LEVEL_SQL:WARN}
    org.springframework.web: ${LOGGING_LEVEL_WEB:WARN}
    org.flywaydb: INFO
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}) %clr([%thread]) %clr(%-5level) %clr(%logger{36}) - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

  # File logging configuration
  file:
    name: ${LOGGING_FILE_NAME:logs/gooddeeds.log}

  # Logback configuration for production
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
      total-size-cap: 1GB
      clean-history-on-start: false

# Management endpoints for monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      show-components: when_authorized
  info:
    env:
      enabled: true
